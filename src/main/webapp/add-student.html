<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
 <nav class="navbar navbar-dark bg-dark">
 <div class="container-fluid">
 <span class="navbar-brand mb-0 h1">Student Management System</span>
 </div>
 </nav>
 
 <div class="container mt-5">
 <div class="card shadow p-4">
 <h3 class="text-center mb-4">Add Student</h3>
 
 <form action="addStudent" method="post">
 <div class="mb-3">
 <label class="form-label">Student ID</label>
 <input type="text" name="id" class="form-control" required>
 </div>
 
 <div class="mb-3">
 <label class="form-label">Student Name</label>
 <input type="text" name="name" class="form-control" required>
 </div>
 
 <div class="mb-3">
 <label class="form-label">Student Age</label>
 <input type="number" name="age" class="form-control" required>
 </div>
 
 <button type="submit" class="btn btn-success w-100">Add Student</button>
 
 </form>
 <hr>
 <a href="viewStudents" class="btn btn-primary w-100">View All Students</a>
 </div>
 </div>
</body>
</html>
